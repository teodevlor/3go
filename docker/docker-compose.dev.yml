services:
  gogogo-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - minio
    volumes:
      - ..:/gogogo-api
    environment:
      APP_ENV: docker_dev
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER: "on"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  postgres:
    image: postgis/postgis:15-3.4
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gogogo
    volumes:
      # - ../scripts/postgres:/var/lib/postgresql/data
      - postgres_data_dev:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data_dev:
  minio_data: